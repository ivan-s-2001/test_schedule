name: Mirror source and add Semantic UI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/mirror-source.yml

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror source repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          git clone --mirror https://github.com/ivan-s-2001/schichtplaner-qt.git source.git
          cd source.git
          git remote set-url --push origin "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPOSITORY}.git"
          git push --mirror --force

      - name: Add Semantic UI CSS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPOSITORY}.git" work
          cd work
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm install --save --package-lock-only --ignore-scripts semantic-ui-css@2.5.0

          python3 - <<'PY'
          from pathlib import Path

          candidates = [
              Path("app/layout.tsx"),
              Path("src/app/layout.tsx"),
          ]
          candidates += sorted(Path("app").glob("**/layout.tsx")) if Path("app").exists() else []
          candidates += sorted(Path("src/app").glob("**/layout.tsx")) if Path("src/app").exists() else []

          target = None
          for path in candidates:
              if path.is_file() and "globals.css" in path.read_text(encoding="utf-8"):
                  target = path
                  break

          if target is None:
              raise SystemExit("Root layout importing globals.css was not found")

          text = target.read_text(encoding="utf-8")
          semantic_import = 'import "semantic-ui-css/semantic.min.css";\n'
          if semantic_import not in text:
              lines = text.splitlines(keepends=True)
              insert_at = 0
              for index, line in enumerate(lines):
                  if line.lstrip().startswith("import "):
                      insert_at = index + 1
              lines.insert(insert_at, semantic_import)
              target.write_text("".join(lines), encoding="utf-8")
          PY

          git add package.json package-lock.json
          git add app src/app 2>/dev/null || true
          git commit -m "Add Semantic UI CSS"
          git push origin HEAD:main
