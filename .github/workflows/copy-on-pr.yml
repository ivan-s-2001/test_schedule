name: Copy schedule source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy source files
        run: |
          git clone --depth 1 https://github.com/ivan-s-2001/schichtplaner-qt.git /tmp/source
          rsync -a --delete --exclude=.git --exclude=.github/workflows/copy-on-pr.yml /tmp/source/ ./

      - name: Install Semantic UI CSS
        run: |
          npm install --save --package-lock-only --ignore-scripts semantic-ui-css@2.5.0
          python3 - <<'PY'
          from pathlib import Path
          candidates = [Path("app/layout.tsx"), Path("src/app/layout.tsx")]
          candidates += sorted(Path("app").glob("**/layout.tsx")) if Path("app").exists() else []
          candidates += sorted(Path("src/app").glob("**/layout.tsx")) if Path("src/app").exists() else []
          target = next((p for p in candidates if p.is_file() and "globals.css" in p.read_text(encoding="utf-8")), None)
          if target is None:
              raise SystemExit("Root layout was not found")
          text = target.read_text(encoding="utf-8")
          line = 'import "semantic-ui-css/semantic.min.css";\n'
          if line not in text:
              rows = text.splitlines(keepends=True)
              index = max((i + 1 for i, row in enumerate(rows) if row.lstrip().startswith("import ")), default=0)
              rows.insert(index, line)
              target.write_text("".join(rows), encoding="utf-8")
          PY

      - name: Commit copied project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Copy schichtplaner-qt and add Semantic UI"
          git push origin HEAD:main
